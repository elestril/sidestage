[project]
name = "sidestage"
version = "0.1.0"
description = "Sidestage Core Platform"
authors = [
    {name = "Harald Schioberg",email = "13667138+elestril@users.noreply.github.com"}
]
readme = "README.md"
requires-python = "^3.12"
dependencies = [
    "agno (>=2.4.7,<3.0.0)",
    "openai (>=2.16.0,<3.0.0)",
    "google-generativeai (>=0.8.6,<0.9.0)"
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "pytest (>=9.0.2,<10.0.0)"
]

[tool.pytest.ini_options]
pythonpath = "src"
testpaths = ["tests"]
