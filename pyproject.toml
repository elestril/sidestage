[project]
name = "sidestage"
version = "0.1.0"
description = "Sidestage Core Platform"
authors = [
    {name = "Harald Schioberg",email = "13667138+elestril@users.noreply.github.com"}
]
readme = "README.md"
requires-python = ">=3.12,<3.15"
dependencies = [
    "openai (>=2.16.0,<3.0.0)",
    "google-generativeai (>=0.8.6,<0.9.0)",
    "pyyaml (>=6.0.3,<7.0.0)",
    "fastapi (>=0.128.0,<0.129.0)",
    "uvicorn[standard] (>=0.40.0,<0.41.0)",
    "pyjwt (>=2.10.1,<3.0.0)",
    "websockets (>=16.0,<17.0)",
    "opentelemetry-api (>=1.39.1,<2.0.0)",
    "opentelemetry-sdk (>=1.39.1,<2.0.0)",
    "sqlalchemy (>=2.0.46,<3.0.0)",
    "litellm (>=1.81.6,<2.0.0)",
    "httpx (>=0.28.1,<0.29.0)",
    "falkordb (>=1.4.0,<2.0.0)",
]

[project.scripts]
sidestage = "sidestage.server:main"
server = "sidestage.server:main"


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "pytest (>=9.0.2,<10.0.0)",
    "pyright (>=1.1.408,<2.0.0)",
    "types-pyyaml (>=6.0.12.20250915,<7.0.0.0)",
    "httpx (>=0.28.1,<0.29.0)",
    "mcp-server-git (>=2026.1.14,<2027.0.0)",
    "pytest-timeout (>=2.4.0,<3.0.0)",
    "anyio[trio] (>=4.9.0,<5.0.0)",
    "pytest-anyio (>=0.0.0)",
    "uv (>=0.10.0,<0.11.0)",
]

[tool.pytest.ini_options]
pythonpath = "src"
testpaths = ["tests"]
markers = [
    "llm: tests requiring a live LLM instance at localhost:8080",
]
