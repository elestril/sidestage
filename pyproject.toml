[project]
name = "sidestage"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "litellm",
    "python-multipart",
    "pyyaml",
    "python-frontmatter",
]

[project.scripts]
sidestage = "sidestage.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sidestage"]

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "httpx",
]

[tool.pytest.ini_options]
python_files = "*_test.py test_*.py"
testpaths = ["src/sidestage"]
asyncio_mode = "auto"
