<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidestage - AI Co-Author</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Sidestage</h1>
            <nav>
                <a href="#" id="nav-chat">Chat</a>
                <a href="#" id="nav-entities">Entities</a>
                <a href="/traces">Traces</a>
            </nav>
        </header>
        <div id="main-content">
            <aside id="sidebar">
                <div class="sidebar-section">
                    <h3>Scenes</h3>
                    <div id="scene-list">
                        <!-- Scenes will be listed here -->
                    </div>
                    <button id="create-scene-btn" class="small-btn">New Scene</button>
                </div>
            </aside>
            <main id="chat-container">
                <div class="chat-widget">
                    <div class="scene-header">
                        <span class="scene-name">Campaign Planning</span>
                        <span class="scene-gametime"></span>
                    </div>
                    <div class="messages-display"></div>
                    <form class="chat-form">
                        <input type="text" class="user-input" placeholder="Type your message..." autocomplete="off">
                        <button type="submit">Send</button>
                    </form>
                </div>
            </main>
            <main id="entities-container" style="display: none;">
                <div id="entities-browser">
                    <div class="toolbar">
                        <div class="filters">
                            <button class="filter-btn active" data-filter="all">All</button>
                            <button class="filter-btn" data-filter="NPC">NPCs</button>
                            <button class="filter-btn" data-filter="Location">Locations</button>
                            <button class="filter-btn" data-filter="Item">Items</button>
                        </div>
                        <div class="actions">
                            <button id="import-btn">Import</button>
                            <button id="export-btn">Export</button>
                        </div>
                    </div>
                    <div id="entity-list">
                        <!-- Entities will be rendered here -->
                    </div>
                </div>
                <div id="splitter"></div>
                <div class="chat-widget">
                    <div class="scene-header">
                        <span class="scene-name">Campaign Planning</span>
                        <span class="scene-gametime"></span>
                    </div>
                    <div class="messages-display"></div>
                    <form class="chat-form">
                        <input type="text" class="user-input" placeholder="Ask about entities..." autocomplete="off">
                        <button type="submit">Send</button>
                    </form>
                </div>
            </main>
        </div>

        <div id="entity-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Entity Name</h2>
                    <span class="close-btn">&times;</span>
                </div>
                <div class="modal-type" id="modal-type">NPC</div>
                <pre id="modal-markdown" class="markdown-body"></pre>
            </div>
        </div>
    </div>
    <script src="app.js?v=2"></script>
</body>
</html>
