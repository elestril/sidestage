# Localhost profile — assumes an OpenAI-compatible HTTP endpoint is
# already running at the URL below. Sidestage does NOT spawn it.
#
# Typical providers:
#   llama-server --host 127.0.0.1 --port 8080 --hf-repo ... --hf-file ...
#   vllm serve <model> --port 8080
#   ollama serve  (then `ollama pull <model>`; default port 11434)
#
# Edit `endpoint` to point at whatever you run; the `model` string is
# whatever the server reports / accepts (llama-server ignores the name).

models:
  default:
    endpoint: http://127.0.0.1:8080
    model: openai/default
