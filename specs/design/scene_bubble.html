<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>scene_bubble — design spec</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./nav.js" defer></script>
  </head>
  <body class="bg-slate-300">
    <main style="min-height: calc(100vh - var(--nav-h, 26px)); padding: 24px;">
      <div class="mx-auto flex max-w-md flex-col gap-6">

        <!-- Single bubble inside a sidebar-styled frame, demonstrating the
             component in its natural habitat. design-root contains JUST
             the <li> — copyable verbatim into a JSX <li> mapped from
             scenes.map(...). -->
        <section>
          <h2 class="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-600">default</h2>
          <div class="w-64 rounded-md border border-slate-200 bg-white p-2 shadow">
            <ul class="flex flex-col">
              <li id="design-root" data-testid="scene-bubble" data-entity-id="tavern"
                  class="cursor-pointer select-none rounded-md px-3 py-2 text-sm text-slate-700 hover:bg-slate-100">The Cracked Tankard</li>
            </ul>
          </div>
          <p class="mt-2 text-xs text-slate-500">Hover the bubble above to see the <code class="rounded bg-slate-200 px-1">hover:bg-slate-100</code> state.</p>
        </section>

        <!-- Multiple bubbles in a sidebar — illustrates how they appear in
             EntitySelector. NOT inside design-root (that's the single
             copyable atom). -->
        <section>
          <h2 class="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-600">in context (EntitySelector)</h2>
          <div class="w-64 rounded-md border border-slate-200 bg-white shadow">
            <div class="border-b border-slate-200 px-3 py-2 text-xs font-medium uppercase tracking-wide text-slate-500">Scenes</div>
            <ul class="flex flex-col p-2">
              <li data-testid="scene-bubble" data-entity-id="parlor"
                  class="cursor-pointer select-none rounded-md px-3 py-2 text-sm text-slate-700 hover:bg-slate-100">The Parlor</li>
              <li data-testid="scene-bubble" data-entity-id="tavern"
                  class="cursor-pointer select-none rounded-md bg-slate-100 px-3 py-2 text-sm text-slate-700 hover:bg-slate-100">The Cracked Tankard</li>
              <li data-testid="scene-bubble" data-entity-id="dungeon_entrance"
                  class="cursor-pointer select-none rounded-md px-3 py-2 text-sm text-slate-700 hover:bg-slate-100">Dungeon Entrance</li>
            </ul>
          </div>
          <p class="mt-2 text-xs text-slate-500">Background <code class="rounded bg-slate-200 px-1">bg-slate-100</code> on the middle row simulates the hover/focus state.</p>
        </section>

      </div>
    </main>
  </body>
</html>
