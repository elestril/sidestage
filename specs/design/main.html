<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>main — design spec playground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./nav.js" defer></script>
  </head>
  <body class="bg-slate-300">
    <!-- nav banner injected by nav.js — also hosts the Slot + Connected
         playground controls on this page. -->

    <!-- The boxed iframe IS the design. Anything outside it (nav bar above,
         page background around) is scaffolding. -->
    <div style="height: calc(100vh - var(--nav-h, 26px)); padding: 24px;">
      <div class="mx-auto flex h-full max-w-6xl flex-col overflow-hidden rounded-md bg-white shadow-2xl ring-1 ring-slate-900/10">
        <!-- Fake browser chrome — purely decorative; signals "this rectangle is the app". -->
        <div class="flex items-center gap-2 border-b border-slate-200 bg-slate-100 px-3 py-1.5">
          <span class="h-3 w-3 rounded-full bg-red-400"></span>
          <span class="h-3 w-3 rounded-full bg-amber-400"></span>
          <span class="h-3 w-3 rounded-full bg-emerald-400"></span>
        </div>
        <iframe
          id="design-iframe"
          src="./workspace.html?slot=scene_panel&connected=true"
          class="w-full flex-1 border-0 bg-white"
          title="Sidestage workspace preview"
        ></iframe>
      </div>
    </div>

    <script>
      // Repoint the iframe whenever the nav bar's playground controls change.
      const iframe = document.getElementById('design-iframe');
      document.addEventListener('designnav:change', (e) => {
        const params = new URLSearchParams({
          slot: e.detail.slot,
          connected: e.detail.connected ? 'true' : 'false',
        });
        iframe.src = `./workspace.html?${params.toString()}`;
      });
    </script>
  </body>
</html>
